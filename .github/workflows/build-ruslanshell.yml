name: Build RuslanShell APK

on:
  push:
    branches: [main]
    paths:
      - 'ruslan-shell/**'
  pull_request:
    branches: [main]
    paths:
      - 'ruslan-shell/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ruslan-shell

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK (Debug)
        run: ./gradlew assembleDebug

      - name: Build APK (Release)
        run: ./gradlew assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ruslanshell-apks
          path: |
            ruslan-shell/app/build/outputs/apk/debug/*.apk
            ruslan-shell/app/build/outputs/apk/release/*.apk
